name: CoachCap
options:
  bundleIdPrefix: com.coachcam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  Sentry:
    url: https://github.com/getsentry/sentry-swift.git
    from: 8.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: 2.5.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application: Jake Maddox (MHHL77MX8D)"
    OTHER_CODE_SIGN_FLAGS: --timestamp
    DEVELOPMENT_TEAM: MHHL77MX8D
    PRODUCT_NAME: CoachCam
    PRODUCT_BUNDLE_IDENTIFIER: com.coachcam.app
    INFOPLIST_FILE: CoachCap/Info.plist
    CODE_SIGN_ENTITLEMENTS: CoachCap/CoachCap-Release.entitlements

targets:
  CoachCap:
    type: application
    platform: macOS
    sources:
      - path: CoachCap
        excludes:
          - "**/*.md"
    resources:
      - CoachCap/Assets.xcassets
    dependencies:
      - package: Sentry
      - package: Sparkle
    info:
      path: CoachCap/Info.plist
      properties:
        NSCameraUsageDescription: "CoachCap uses your camera to record a face-cam overlay on your screen recordings."
        NSMicrophoneUsageDescription: "CoachCap uses your microphone to record audio commentary with your screen recordings."
    entitlements:
      path: CoachCap/CoachCap-Release.entitlements
    configurations:
      Debug:
        settings:
          CODE_SIGN_ENTITLEMENTS: CoachCap/CoachCap.entitlements
